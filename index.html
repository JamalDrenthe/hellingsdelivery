<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags (max 60 tekens title / max 160 tekens description) -->
    <title>Hellings Delivery | Luxe & Veilig Vervoer in Nederland</title>
    <meta name="description" content="Hellings Delivery: exclusieve koeriers- en vervoersdiensten. VIP vervoer, discreet transport en zorgvervoer in Nederland en België. 24/7 beschikbaar." />

    <meta name="author" content="Hellings Delivery" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Canonical & hreflang -->
    <link rel="canonical" href="https://hellingsdelivery.nl" />
    <link rel="alternate" hreflang="nl" href="https://hellingsdelivery.nl" />
    <link rel="alternate" hreflang="x-default" href="https://hellingsdelivery.nl" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/hellingsdeliverylogo.png" />
    <link rel="apple-touch-icon" href="/images/hellingsdeliverylogo.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#f04e23" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn (absolute URLs vereist) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hellingsdelivery.nl" />
    <meta property="og:site_name" content="Hellings Delivery" />
    <meta property="og:locale" content="nl_NL" />
    <meta property="og:title" content="Hellings Delivery — Luxe & Discreet Vervoer" />
    <meta property="og:description" content="Exclusief koeriers- en vervoersbedrijf. VIP ritten, zorgvervoer & discreet transport in NL & BE. Altijd bereikbaar, 24/7." />
    <meta property="og:image" content="https://hellingsdelivery.nl/images/hellingsdeliverylogofull.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Hellings Delivery logo – luxe vervoersdiensten" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@hellingsdelivery" />

    <meta name="twitter:title" content="Hellings Delivery — Luxe & Discreet Vervoer" />
    <meta name="twitter:description" content="Exclusief koeriers- en vervoersbedrijf. VIP ritten, zorgvervoer & discreet transport in NL & BE. Altijd bereikbaar." />

    <meta name="twitter:image:alt" content="Hellings Delivery logo – luxe vervoersdiensten" />

    <!-- JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://hellingsdelivery.nl/#website",
      "name": "Hellings Delivery",
      "url": "https://hellingsdelivery.nl",
      "description": "Exclusieve koeriers- en vervoersdiensten in Nederland en België",
      "inLanguage": "nl-NL",
      "publisher": { "@id": "https://hellingsdelivery.nl/#organization" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://hellingsdelivery.nl/faq?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://hellingsdelivery.nl/#organization",
      "name": "Hellings Delivery",
      "url": "https://hellingsdelivery.nl",
      "logo": {
        "@type": "ImageObject",
        "url": "https://hellingsdelivery.nl/images/hellingsdeliverylogo.png",
        "width": 512,
        "height": 512
      },
      "image": "https://hellingsdelivery.nl/images/hellingsdeliverylogofull.png",
      "description": "Exclusieve koeriersdiensten in Nederland en België met 100% discretie. Discreet goederentransport, vertrouwelijke zendingen en maatwerk voor bedrijven.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["Dutch", "English"],
        "url": "https://hellingsdelivery.nl/contact"
      },
      "sameAs": [
        "https://github.com/JamalDrenthe/hellingsdelivery"
      ]
    }
    </script>

    <!-- JSON-LD: LocalBusiness + TaxiService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "TaxiService"],
      "@id": "https://hellingsdelivery.nl/#organization",
      "name": "Hellings Delivery",
      "description": "Discreet goederentransport en vertrouwelijke koeriersdiensten in Nederland en België. Luxe goederentransport, vertrouwelijk vervoer en maatwerk voor bedrijven met 100% discretie.",
      "url": "https://hellingsdelivery.nl",
      "logo": {
        "@type": "ImageObject",
        "url": "https://hellingsdelivery.nl/images/hellingsdeliverylogo.png"
      },
      "image": "https://hellingsdelivery.nl/images/hellingsdeliverylogofull.png",
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      },
      "priceRange": "€€€",
      "areaServed": [
        { "@type": "Country", "name": "Nederland" },
        { "@type": "Country", "name": "België" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Vervoersdiensten",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Luxe Goederentransport",
              "description": "Discreet transport van kostbare kunst, antiek, sieraden en exclusieve objecten"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Vertrouwelijk Vervoer",
              "description": "Veilige bezorging van gevoelige documenten, medische dossiers en bedrijfsgevoelige informatie"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Maatwerk voor Bedrijven",
              "description": "Flexibele logistieke oplossingen, vaste contracten en spoeddiensten voor zakelijke klanten"
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
